<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova senha - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <main class="app-main" style="margin-left: 0; margin-top: 0; max-width: 480px; margin: 48px auto; padding: 24px;">
        <h1 class="page-title">Definir nova senha</h1>
        <div class="card">
            <form id="form-nova-senha" class="form-grid">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="nova_senha">Nova senha</label>
                    <input type="password" id="nova_senha" name="nova_senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="confirmar_senha">Confirmar senha</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" required minlength="6" placeholder="Repita a senha">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Redefinir senha</button>
                </div>
            </form>
            <p style="margin-top: 16px; color: var(--text-muted);">
                <a href="login.html">Voltar ao login</a>
            </p>
            <p id="msg" style="margin-top: 12px;"></p>
        </div>
    </main>
    <script src="../js/fetch-helpers.js"></script>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token') || '';

            if (!token) {
                document.getElementById('msg').style.color = 'var(--risk-severe)';
                document.getElementById('msg').textContent = 'Link inválido. Solicite uma nova redefinição de senha.';
                document.getElementById('form-nova-senha').querySelector('button[type="submit"]').disabled = true;
            }

            document.getElementById('form-nova-senha').addEventListener('submit', function (e) {
                e.preventDefault();
                var novaSenha = document.getElementById('nova_senha').value;
                var confirmarSenha = document.getElementById('confirmar_senha').value;
                var msgEl = document.getElementById('msg');
                msgEl.textContent = '';

                if (novaSenha !== confirmarSenha) {
                    msgEl.style.color = 'var(--risk-severe)';
                    msgEl.textContent = 'As senhas não coincidem.';
                    return;
                }

                if (novaSenha.length < 6) {
                    msgEl.style.color = 'var(--risk-severe)';
                    msgEl.textContent = 'A senha deve ter no mínimo 6 caracteres.';
                    return;
                }

                fetch('/backend/nova_senha.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, nova_senha: novaSenha })
                })
                .then(parseJsonFetchResponse)
                .then(function(data) {
                    msgEl.style.color = data.success ? 'var(--risk-none)' : 'var(--risk-severe)';
                    msgEl.textContent = data.message || (data.success ? 'Senha alterada.' : 'Erro.');
                    if (data.success) {
                        msgEl.textContent = 'Senha alterada com sucesso! Redirecionando para o login em 3 segundos...';
                        setTimeout(function() { window.location.href = 'login.html'; }, 3000);
                    }
                })
                .catch(function(err) {
                    console.error('Erro:', err);
                    msgEl.style.color = 'var(--risk-severe)';
                    msgEl.textContent = err.message || 'Erro ao conectar. Verifique se o servidor está rodando.';
                });
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header class="app-topbar">
        <h1>AI Pharma Guard</h1>
    </header>
    <aside class="app-sidebar">
        <nav>
            <div class="nav-title">Navegação</div>
            <ul>
                <li><a href="dashboard.html"><span class="nav-icon">&#128202;</span><span>Dashboard</span></a></li>
                <li><a href="pacientes.html" class="active"><span class="nav-icon">&#128100;</span><span>Pacientes</span></a></li>
                <li><a href="medicamentos.html"><span class="nav-icon">&#128138;</span><span>Medicamentos</span></a></li>
                <li><a href="interacoes.html"><span class="nav-icon">&#9888;</span><span>Interações</span></a></li>
                <li><a href="relatorios.html"><span class="nav-icon">&#128203;</span><span>Relatórios</span></a></li>
                <li><a href="login.html"><span class="nav-icon">&#128274;</span><span>Login</span></a></li>
                <li><a href="cadastro.html"><span class="nav-icon">&#127970;</span><span>Cadastrar Farmácia</span></a></li>
            </ul>
        </nav>
    </aside>
    <main class="app-main">
        <h1 class="page-title">Pacientes</h1>

        <div class="card">
            <h3>Cadastro de Paciente</h3>
            <form id="form-paciente" class="form-grid" style="max-width: 640px;">
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="idade">Idade *</label>
                    <input type="number" id="idade" name="idade" required min="1" max="120" placeholder="Idade">
                </div>
                <div class="form-group">
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo">
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="doencas">Doenças / Condições</label>
                    <input type="text" id="doencas" name="doencas" placeholder="Ex: Hipertensão, Diabetes">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="medicamentos">Medicamentos em uso</label>
                    <div class="medicamentos-verificar-row">
                        <input type="text" id="medicamentos" name="medicamentos" placeholder="Ex: Varfarina, AAS, Omeprazol (separados por vírgula ou ponto e vírgula)">
                        <button type="button" id="btn-verificar-interacoes" class="btn btn-secondary">Verificar Interações</button>
                    </div>
                    <div id="banner-interacoes" class="banner-interacoes hidden" role="alert" aria-live="polite"></div>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="alergias">Alergias</label>
                    <textarea id="alergias" name="alergias" rows="2" placeholder="Alergias conhecidas (medicamentos, substâncias)"></textarea>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <div class="alergia-check-row">
                        <label>Verificar alergia (paciente existente)</label>
                        <select id="alergia-paciente" class="input-select">
                            <option value="">Selecione o paciente</option>
                        </select>
                        <input type="text" id="alergia-medicamento" placeholder="Nome do medicamento (ex: Dipirona)" class="input-text">
                        <button type="button" id="btn-verificar-alergia" class="btn btn-secondary">Verificar Alergias</button>
                    </div>
                    <div id="alerta-alergia-banner" class="alerta-banner hidden" role="alert"></div>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="historico_clinico">Histórico clínico</label>
                    <textarea id="historico_clinico" name="historico_clinico" rows="3" placeholder="Histórico clínico relevante"></textarea>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="observacoes">Observações farmacêuticas</label>
                    <textarea id="observacoes" name="observacoes" rows="2" placeholder="Observações do farmacêutico"></textarea>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Cadastrar Paciente</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>Pacientes cadastrados</h3>
            <div class="table-wrap">
                <table class="data-table" id="tabela-pacientes">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Idade</th>
                            <th>Sexo</th>
                            <th>Doencas</th>
                            <th>Medicamentos em uso</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="paginacao-wrap" id="paginacao-wrap" style="display: none;">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-pag-prev">Anterior</button>
                <span class="paginacao-info" id="paginacao-info">Página 1 de 1</span>
                <button type="button" class="btn btn-secondary btn-sm" id="btn-pag-next">Próxima</button>
            </div>
        </div>
    </main>
    <script src="../js/app.js?v=3"></script>
    <script>
        (function() {
            var form = document.getElementById('form-paciente');
            var tbody = document.querySelector('#tabela-pacientes tbody');
            var pagWrap = document.getElementById('paginacao-wrap');
            var pagInfo = document.getElementById('paginacao-info');
            var btnPrev = document.getElementById('btn-pag-prev');
            var btnNext = document.getElementById('btn-pag-next');
            var limit = 20;
            var currentPage = 1;
            var totalRecords = 0;
            var currentData = [];

            function loadPacientes(page) {
                page = page || 1;
                currentPage = page;
                api.listarPacientes(page, limit).then(function(res) {
                    var pacientes = res && res.data ? res.data : [];
                    var total = res && typeof res.total === 'number' ? res.total : 0;
                    var pageNum = res && typeof res.page === 'number' ? res.page : 1;
                    totalRecords = total;
                    currentData = pacientes;

                    if (!Array.isArray(pacientes)) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--risk-severe);">Resposta inválida da API.</td></tr>';
                        return;
                    }
                    if (pacientes.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Nenhum paciente cadastrado.</td></tr>';
                    } else {
                        tbody.innerHTML = pacientes.map(function(p) {
                            return '' +
                                '<tr>' +
                                '<td>' + p.id + '</td>' +
                                '<td>' + escapeHtml(p.nome) + '</td>' +
                                '<td>' + p.idade + '</td>' +
                                '<td>' + (p.sexo || '-') + '</td>' +
                                '<td>' + escapeHtml(p.doencas || '-') + '</td>' +
                                '<td>' + escapeHtml(p.medicamentos_usados || '-') + '</td>' +
                                '<td><button type="button" class="btn btn-secondary btn-sm" onclick="analisarRiscoPaciente(' + p.id + ', \'' + (p.nome ? String(p.nome).replace(/'/g, "\\'") : '') + '\')">Analisar risco clínico</button> ' +
                                '<button type="button" onclick="exportarPDF(' + p.id + ')" class="btn btn-sm btn-export-pdf" title="Exportar prontuário em PDF">Exportar PDF</button></td>' +
                                '</tr>';
                        }).join('');
                    }

                    var totalPages = limit > 0 ? Math.max(1, Math.ceil(total / limit)) : 1;
                    pagInfo.textContent = 'Página ' + pageNum + ' de ' + totalPages + ' (' + total + ' registros)';
                    pagWrap.style.display = total > limit ? 'flex' : 'none';
                    btnPrev.disabled = pageNum <= 1;
                    btnNext.disabled = pageNum >= totalPages;

                    var sel = document.getElementById('alergia-paciente');
                    sel.innerHTML = '<option value="">Selecione o paciente</option>' +
                        pacientes.map(function(p) {
                            return '<option value="' + p.id + '">' + escapeHtml(p.nome) + ' (ID ' + p.id + ')</option>';
                        }).join('');
                }).catch(function(err) {
                    console.error('[Pacientes] Erro ao listar:', err);
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--risk-severe);">Erro ao carregar. Verifique o console.</td></tr>';
                });
            }

            if (btnPrev) btnPrev.addEventListener('click', function() {
                if (currentPage > 1) loadPacientes(currentPage - 1);
            });
            if (btnNext) btnNext.addEventListener('click', function() {
                if (limit > 0 && totalRecords > currentPage * limit) loadPacientes(currentPage + 1);
            });

            var medicamentosInput = document.getElementById('medicamentos');
            var btnVerificarInteracoes = document.getElementById('btn-verificar-interacoes');
            var bannerInteracoes = document.getElementById('banner-interacoes');

            function renderBannerInteracoes(alertas) {
                bannerInteracoes.classList.remove('hidden');
                if (!alertas || alertas.length === 0) {
                    bannerInteracoes.className = 'banner-interacoes banner-interacoes--verde';
                    bannerInteracoes.innerHTML = '&#9989; Nenhuma interação medicamentosa encontrada para a lista informada.';
                    return;
                }
                var ordem = { grave: 0, moderada: 1, baixo: 2 };
                alertas = alertas.slice().sort(function(a, b) {
                    return (ordem[a.nivel_risco] !== undefined ? ordem[a.nivel_risco] : 3) - (ordem[b.nivel_risco] !== undefined ? ordem[b.nivel_risco] : 3);
                });
                var temGrave = alertas.some(function(a) { return (a.nivel_risco || '').toLowerCase() === 'grave'; });
                var temModerada = alertas.some(function(a) { return (a.nivel_risco || '').toLowerCase() === 'moderada'; });
                bannerInteracoes.className = 'banner-interacoes ' + (temGrave ? 'banner-interacoes--vermelho' : temModerada ? 'banner-interacoes--amarelo' : 'banner-interacoes--verde');
                bannerInteracoes.innerHTML = alertas.map(function(a) {
                    var nivel = (a.nivel_risco || '').toLowerCase();
                    var icon = nivel === 'grave' ? '&#9888;' : nivel === 'moderada' ? '&#9889;' : '&#9989;';
                    var par = escapeHtml(a.medicamentoA || '') + ' + ' + escapeHtml(a.medicamentoB || '');
                    var rec = escapeHtml(a.recomendacao || '');
                    return '<div class="banner-interacoes-item banner-interacoes-item--' + (nivel === 'grave' ? 'grave' : nivel === 'moderada' ? 'moderada' : 'baixo') + '">' +
                        '<strong>' + icon + ' ' + par + '</strong><br><span class="banner-interacoes-rec">' + rec + '</span></div>';
                }).join('');
            }

            function verificarInteracoesMedicamentos() {
                var texto = (medicamentosInput && medicamentosInput.value) ? medicamentosInput.value.trim() : '';
                if (!texto) {
                    bannerInteracoes.classList.add('hidden');
                    return;
                }
                api.verificarInteracoesPaciente({ medicamentos_texto: texto }).then(function(r) {
                    renderBannerInteracoes(r.alertas || []);
                }).catch(function(err) {
                    bannerInteracoes.classList.remove('hidden');
                    bannerInteracoes.className = 'banner-interacoes banner-interacoes--amarelo';
                    bannerInteracoes.textContent = 'Erro ao verificar interações: ' + (err.message || 'tente novamente.');
                });
            }

            if (medicamentosInput) medicamentosInput.addEventListener('blur', verificarInteracoesMedicamentos);
            if (btnVerificarInteracoes) btnVerificarInteracoes.addEventListener('click', verificarInteracoesMedicamentos);

            document.getElementById('btn-verificar-alergia').addEventListener('click', function() {
                var pacienteId = document.getElementById('alergia-paciente').value;
                var medicamentoNome = document.getElementById('alergia-medicamento').value.trim();
                var banner = document.getElementById('alerta-alergia-banner');
                banner.classList.add('hidden');
                if (!pacienteId || !medicamentoNome) {
                    banner.className = 'alerta-banner alerta-banner--amarelo';
                    banner.textContent = 'Selecione um paciente e informe o nome do medicamento.';
                    banner.classList.remove('hidden');
                    return;
                }
                api.verificarAlergia(parseInt(pacienteId, 10), medicamentoNome).then(function(r) {
                    banner.classList.remove('hidden');
                    if (r.alerta === true) {
                        banner.className = 'alerta-banner alerta-banner--vermelho';
                        banner.innerHTML = '⚠️ ' + (r.mensagem || 'Paciente possui alergia registrada a este medicamento.');
                    } else {
                        banner.className = 'alerta-banner alerta-banner--verde';
                        banner.innerHTML = '✅ ' + (r.mensagem || 'Nenhuma alergia encontrada para este medicamento.');
                    }
                }).catch(function(err) {
                    banner.className = 'alerta-banner alerta-banner--amarelo';
                    banner.textContent = 'Erro ao verificar: ' + (err.message || 'tente novamente.');
                    banner.classList.remove('hidden');
                });
            });

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                api.cadastrarPaciente({
                    nome: document.getElementById('nome').value,
                    idade: parseInt(document.getElementById('idade').value, 10) || 0,
                    sexo: document.getElementById('sexo').value,
                    doencas: document.getElementById('doencas').value || '',
                    medicamentos: document.getElementById('medicamentos').value || '',
                    alergias: document.getElementById('alergias').value || '',
                    historico_clinico: document.getElementById('historico_clinico').value || '',
                    observacoes: document.getElementById('observacoes').value || ''
                }).then(function(data) {
                    form.reset();
                    loadPacientes(currentPage);
                    btn.disabled = false;
                    alert('Paciente cadastrado com sucesso!');
                }).catch(function(err) {
                    console.error('[Pacientes] Erro ao cadastrar:', err);
                    btn.disabled = false;
                    alert('Erro: ' + (err.message || 'Não foi possível cadastrar.'));
                });
            });

            window.analisarRiscoPaciente = function(id, nome) {
                api.analisarRiscoPaciente(id).then(function(data) {
                    var titulo = nome || ('Paciente #' + id);
                    alert(
                        'Risco clínico de ' + titulo + ':\n' +
                        '- Nível: ' + (data.nivel || '-') + '\n' +
                        '- Score: ' + (data.score ?? '-') + '\n' +
                        '- Recomendações: ' + (data.recomendacao || '-')
                    );
                }).catch(function(err) {
                    console.error('[Risco clínico] Erro na análise:', err);
                    alert('Erro ao analisar risco clínico: ' + (err && err.message ? err.message : 'Verifique o console.'));
                });
            };

            // Exportar prontuário em PDF via jsPDF (dados buscados na API)
            window.exportarPDF = function(pacienteId) {
                var apiUrl = '/backend/api.php?action=buscar_paciente&id=' + encodeURIComponent(pacienteId);
                fetch(apiUrl, { method: 'GET', credentials: 'same-origin' })
                    .then(function(r) {
                        return r.text().then(function(text) {
                            var t = (text || '').trim();
                            if (t.charAt(0) === '<') {
                                throw new Error('Resposta HTML (HTTP ' + r.status + '). Verifique /backend/api.php.');
                            }
                            var data;
                            try {
                                data = JSON.parse(t);
                            } catch (e) {
                                throw new Error('Resposta não é JSON válido (HTTP ' + r.status + ').');
                            }
                            if (!r.ok) {
                                throw new Error((data && (data.message || data.error)) || ('Erro HTTP ' + r.status));
                            }
                            return data;
                        });
                    })
                    .then(function(data) {
                        if (!data.success || !data.paciente) {
                            alert(data.message || 'Paciente não encontrado.');
                            return;
                        }
                        var p = data.paciente;
                        var doc = new window.jspdf.jsPDF();
                        var margem = 20;
                        var largura = doc.internal.pageSize.getWidth() - margem * 2;
                        var y = 20;
                        var lh = 6;

                        function txt(s) { return (s != null && String(s).trim() !== '') ? String(s).trim() : '—'; }
                        function bloco(titulo, conteudo, vermelho) {
                            doc.setFontSize(11);
                            doc.setFont('helvetica', 'bold');
                            doc.setTextColor(30, 58, 138);
                            doc.text(titulo, margem, y);
                            y += lh;
                            doc.setFont('helvetica', 'normal');
                            if (vermelho) doc.setTextColor(185, 28, 28);
                            else doc.setTextColor(50, 50, 50);
                            var linhas = doc.splitTextToSize(conteudo, largura);
                            doc.text(linhas, margem, y);
                            y += linhas.length * lh + 8;
                            doc.setTextColor(0, 0, 0);
                        }

                        doc.setFontSize(16);
                        doc.setTextColor(37, 99, 235);
                        doc.text('AI Pharma Guard — Prontuário Farmacêutico', margem, y);
                        y += 10;
                        doc.setFontSize(9);
                        doc.setTextColor(100, 116, 139);
                        doc.text('Data de geração: ' + new Date().toLocaleString('pt-BR'), margem, y);
                        y += 12;

                        doc.setFontSize(10);
                        doc.setTextColor(0, 0, 0);
                        doc.text('Nome: ' + txt(p.nome), margem, y);
                        y += lh;
                        doc.text('Idade: ' + txt(p.idade) + '    Sexo: ' + txt(p.sexo), margem, y);
                        y += lh + 8;

                        bloco('Doenças / Condições', txt(p.doencas), false);
                        bloco('Medicamentos em uso', txt(p.medicamentos_usados), false);
                        bloco('Alergias conhecidas', txt(p.alergias), (txt(p.alergias) !== '—'));
                        bloco('Histórico clínico', txt(p.historico_clinico), false);
                        bloco('Observações farmacêuticas', txt(p.observacoes), false);

                        y += 6;
                        doc.setDrawColor(226, 232, 240);
                        doc.line(margem, y, margem + largura, y);
                        y += 10;
                        doc.setFontSize(9);
                        doc.setTextColor(100, 116, 139);
                        doc.text('Documento gerado pelo AI Pharma Guard — ' + new Date().toLocaleString('pt-BR'), margem, y);

                        var nomeArquivo = 'prontuario_' + (p.nome || 'paciente').replace(/[^a-zA-Z0-9\u00C0-\u024F\s_-]/g, '').replace(/\s+/g, '_').substring(0, 60) + '_' + new Date().toISOString().slice(0, 10) + '.pdf';
                        doc.save(nomeArquivo);
                    })
                    .catch(function(err) {
                        console.error('[Exportar PDF]', err);
                        alert('Erro ao buscar dados do paciente. Verifique o console.');
                    });
            };

            loadPacientes(1);
        })();
    </script>
</body>
</html>

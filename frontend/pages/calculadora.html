<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Dose - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .calc-page-head {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .calc-page-head__ico {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            color: #2c5d8c;
        }

        .calc-page-head__text h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-title, #0f172a);
            letter-spacing: -0.02em;
        }

        .calc-page-head__text p {
            margin: 6px 0 0;
            font-size: 0.9375rem;
            color: var(--text-muted, #64748b);
            max-width: 560px;
            line-height: 1.5;
        }

        .calc-badge-clin {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #1d4ed8;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
        }

        .calc-form-card {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-subtle, #e2e8f0);
            max-width: 600px;
        }

        .calc-step {
            margin-bottom: 24px;
        }

        .calc-step:last-of-type {
            margin-bottom: 0;
        }

        .calc-step label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }

        .calc-select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #0f172a;
            background: #fafafa;
            cursor: pointer;
        }

        .calc-select:focus {
            outline: none;
            border-color: #2c5d8c;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(44, 93, 140, 0.15);
        }

        .calc-summary {
            margin-top: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 0.875rem;
            line-height: 1.55;
            color: #334155;
        }

        .calc-summary strong {
            color: #0f172a;
        }

        .calc-warn-peso {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #fff7ed;
            border: 1px solid #fdba74;
            color: #c2410c;
            font-size: 0.8125rem;
            font-weight: 600;
        }

        .calc-warn-peso a {
            color: #2c5d8c;
            font-weight: 700;
        }

        .calc-btn-go {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            min-height: 48px;
            margin-top: 8px;
            padding: 0 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(180deg, #3d7d6e 0%, #2c5d8c 55%, #234a6e 100%);
            box-shadow: 0 4px 14px rgba(44, 93, 140, 0.35);
            transition: filter 0.15s ease, transform 0.15s ease;
        }

        .calc-btn-go:hover:not(:disabled) {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .calc-btn-go:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .calc-btn-go svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .calc-out {
            margin-top: 28px;
            max-width: 600px;
            padding: 24px;
            border-radius: 14px;
            background: #fff;
            border: 1px solid #e2e8f0;
        }

        .calc-out--ok {
            border-left: 4px solid #16a34a;
        }

        .calc-out--warn {
            border-left: 4px solid #ea580c;
        }

        .calc-out--crit {
            border-left: 4px solid #dc2626;
        }

        .calc-out__title {
            margin: 0 0 8px;
            font-size: 1.125rem;
            font-weight: 800;
            color: #0f172a;
        }

        .calc-out__dose-num {
            margin: 8px 0 4px;
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
        }

        .calc-out__via {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 12px;
        }

        .calc-badge-class {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .calc-badge-class--ped {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .calc-badge-class--adu {
            background: #ecfdf5;
            color: #047857;
        }

        .calc-badge-class--ger {
            background: #fef3c7;
            color: #b45309;
        }

        .calc-alerts {
            margin: 12px 0;
            padding: 0;
            list-style: none;
        }

        .calc-alerts li {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: #9a3412;
            font-weight: 600;
        }

        .calc-alerts--crit li {
            color: #b91c1c;
        }

        .calc-crit-banner {
            text-align: center;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 10px;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }

        .calc-crit-banner__ico {
            font-size: 2rem;
            line-height: 1;
        }

        .calc-crit-banner__txt {
            margin: 8px 0 0;
            font-size: 1rem;
            font-weight: 800;
            color: #b91c1c;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .calc-dose-max {
            margin-top: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #64748b;
        }

        .calc-obs {
            margin-top: 12px;
            font-size: 0.8125rem;
            color: #64748b;
            line-height: 1.55;
        }

        .calc-contra {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            font-size: 0.875rem;
            color: #991b1b;
            line-height: 1.5;
        }

        .calc-contra h4 {
            margin: 0 0 8px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .calc-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .calc-btn-sec {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #475569;
        }

        .calc-btn-sec:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .hidden {
            display: none !important;
        }

        @media print {
            .app-topbar,
            .app-sidebar,
            .app-overlay,
            .sidebar-toggle,
            .calc-no-print {
                display: none !important;
            }

            .app-main {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

    <script>
        (function () {
            var API_BASE = '/backend/api.php';
            var CALC_API = '/backend/api/calculadora_dose.php';

            var selPac = document.getElementById('calc-paciente');
            var selMed = document.getElementById('calc-med');
            var sumPac = document.getElementById('calc-sum-pac');
            var sumMed = document.getElementById('calc-sum-med');
            var btnCalc = document.getElementById('calc-btn-calc');
            var resultEl = document.getElementById('calc-result');

            var pacientes = [];
            var medicamentos = [];
            var medSelecionado = null;

            function classLabel(c) {
                if (c === 'pediatrico') return 'Pediátrico';
                if (c === 'geriatrico') return 'Geriátrico';
                return 'Adulto';
            }

            function classificarIdade(idade) {
                var i = parseInt(idade, 10);
                if (i < 12) return 'pediatrico';
                if (i >= 60) return 'geriatrico';
                return 'adulto';
            }

            function esc(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }

            function updateButtons() {
                btnCalc.disabled = !selPac.value || !selMed.value;
            }

            function renderPacSummary() {
                var id = selPac.value;
                if (!id) {
                    sumPac.classList.add('hidden');
                    sumPac.innerHTML = '';
                    return;
                }
                var p = pacientes.find(function (x) {
                    return String(x.id) === String(id);
                });
                if (!p) return;
                var cl = classificarIdade(p.idade);
                var peso = p.peso != null && p.peso !== '' ? Number(p.peso) : null;
                var pesoTxt = peso != null && !isNaN(peso) ? peso + ' kg' : '—';
                var html =
                    '<div><strong>Nome:</strong> ' +
                    esc(p.nome) +
                    ' &nbsp;|&nbsp; <strong>Idade:</strong> ' +
                    esc(String(p.idade)) +
                    ' &nbsp;|&nbsp; <strong>Peso:</strong> ' +
                    esc(pesoTxt) +
                    ' &nbsp;|&nbsp; <strong>Classificação:</strong> ' +
                    esc(classLabel(cl)) +
                    '</div>';
                if (peso == null || isNaN(peso) || peso <= 0) {
                    html +=
                        '<div class="calc-warn-peso">Peso não cadastrado — cadastre para cálculo preciso. ' +
                        '<a href="pacientes.html?id=' +
                        encodeURIComponent(String(p.id)) +
                        '">Editar paciente</a></div>';
                }
                sumPac.innerHTML = html;
                sumPac.classList.remove('hidden');
            }

            function renderMedSummary() {
                var id = selMed.value;
                if (!id) {
                    sumMed.classList.add('hidden');
                    medSelecionado = null;
                    sumMed.innerHTML = '';
                    return;
                }
                var m = medicamentos.find(function (x) {
                    return String(x.id) === String(id);
                });
                medSelecionado = m || null;
                if (!m) return;
                var cls = m.classe_farmacologica || m.classe || '—';
                var da = m.dose_adulto || m.dose || '—';
                var via = m.via_administracao || '—';
                sumMed.innerHTML =
                    '<div><strong>Nome:</strong> ' +
                    esc(m.nome) +
                    ' &nbsp;|&nbsp; <strong>Classe:</strong> ' +
                    esc(cls) +
                    ' &nbsp;|&nbsp; <strong>Dose adulto:</strong> ' +
                    esc(String(da)) +
                    ' &nbsp;|&nbsp; <strong>Via:</strong> ' +
                    esc(String(via)) +
                    '</div>';
                sumMed.classList.remove('hidden');
            }

            function loadLists() {
                return fetch(API_BASE + '?action=listar_pacientes&limit=500', { credentials: 'same-origin' })
                    .then(parseJsonFetchResponse)
                    .then(function (data) {
                        pacientes = data.data || [];
                        selPac.innerHTML = '<option value="">Selecione um paciente</option>';
                        pacientes.forEach(function (p) {
                            var o = document.createElement('option');
                            o.value = p.id;
                            o.textContent = p.nome + (p.idade != null ? ' (' + p.idade + ' a.)' : '');
                            selPac.appendChild(o);
                        });
                    })
                    .then(function () {
                        return fetch(API_BASE + '?action=listar_medicamentos', { credentials: 'same-origin' });
                    })
                    .then(parseJsonFetchResponse)
                    .then(function (data) {
                        medicamentos = Array.isArray(data) ? data : [];
                        selMed.innerHTML = '<option value="">Selecione um medicamento</option>';
                        medicamentos.forEach(function (m) {
                            var o = document.createElement('option');
                            o.value = m.id;
                            o.textContent = m.nome;
                            selMed.appendChild(o);
                        });
                    });
            }

            function isCriticoExcede(alertas) {
                return alertas.some(function (a) {
                    return /ALERTA:\s*dose calculada excede/i.test(a);
                });
            }

            function badgeClassHtml(c) {
                var map = {
                    pediatrico: 'calc-badge-class--ped',
                    adulto: 'calc-badge-class--adu',
                    geriatrico: 'calc-badge-class--ger'
                };
                var lab = classLabel(c);
                return '<span class="calc-badge-class ' + (map[c] || 'calc-badge-class--adu') + '">' + esc(lab) + '</span>';
            }

            function renderResult(payload) {
                var p = payload.paciente;
                var m = payload.medicamento;
                var r = payload.resultado;
                var alertas = r.alertas || [];
                var crit = isCriticoExcede(alertas);
                var temAlerta = alertas.length > 0;
                var border = 'calc-out--ok';
                if (crit) border = 'calc-out--crit';
                else if (temAlerta) border = 'calc-out--warn';

                var via = (m && m.via_administracao) || '';
                var html = '<div class="calc-out ' + border + '" id="calc-print-area">';

                if (crit) {
                    html +=
                        '<div class="calc-crit-banner">' +
                        '<div class="calc-crit-banner__ico" aria-hidden="true">⛔</div>' +
                        '<p class="calc-crit-banner__txt">DOSE EXCEDE O MÁXIMO RECOMENDADO</p></div>';
                }

                if (!crit) {
                    html += '<p class="calc-out__title">✓ Dose Recomendada</p>';
                } else {
                    html += '<p class="calc-out__title">Resultado do cálculo (com cautela)</p>';
                }

                html +=
                    '<div class="calc-out__dose-num">' +
                    esc(String(r.dose_calculada_mg)) +
                    ' <span style="font-size:1.25rem;font-weight:700">mg</span></div>';
                html += '<div class="calc-out__via">Via: ' + esc(via || '—') + '</div>';
                html += '<div>' + badgeClassHtml(r.classificacao_paciente) + '</div>';

                if (medSelecionado && medSelecionado.dose_maxima != null && medSelecionado.dose_maxima !== '') {
                    html +=
                        '<p class="calc-dose-max">Dose máxima segura (referência cadastrada): <strong>' +
                        esc(String(medSelecionado.dose_maxima)) +
                        ' mg</strong></p>';
                }

                if (temAlerta) {
                    html += '<ul class="calc-alerts' + (crit ? ' calc-alerts--crit' : '') + '">';
                    alertas.forEach(function (a) {
                        html += '<li><span aria-hidden="true">⚠</span> ' + esc(a) + '</li>';
                    });
                    html += '</ul>';
                }

                html += '<p class="calc-obs"><strong>Prescrição sugerida:</strong> ' + esc(r.dose_recomendada) + '</p>';
                html += '<p class="calc-obs">' + esc(r.observacao) + '</p>';

                if (r.contraindicacoes && String(r.contraindicacoes).trim() !== '') {
                    html +=
                        '<div class="calc-contra"><h4>Contraindicações</h4>' +
                        esc(r.contraindicacoes) +
                        '</div>';
                }

                html +=
                    '<div class="calc-actions calc-no-print">' +
                    '<button type="button" class="calc-btn-sec" id="calc-btn-print">Imprimir cálculo</button>' +
                    '<button type="button" class="calc-btn-sec" id="calc-btn-reset">Nova consulta</button></div>';
                html += '</div>';

                resultEl.innerHTML = html;
                resultEl.classList.remove('hidden');

                document.getElementById('calc-btn-print').addEventListener('click', function () {
                    window.print();
                });
                document.getElementById('calc-btn-reset').addEventListener('click', function () {
                    selPac.value = '';
                    selMed.value = '';
                    sumPac.classList.add('hidden');
                    sumMed.classList.add('hidden');
                    resultEl.classList.add('hidden');
                    resultEl.innerHTML = '';
                    medSelecionado = null;
                    updateButtons();
                });
            }

            selPac.addEventListener('change', function () {
                renderPacSummary();
                updateButtons();
            });
            selMed.addEventListener('change', function () {
                renderMedSummary();
                updateButtons();
            });

            btnCalc.addEventListener('click', function () {
                if (btnCalc.disabled) return;
                btnCalc.disabled = true;
                fetch(CALC_API, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paciente_id: parseInt(selPac.value, 10),
                        medicamento_id: parseInt(selMed.value, 10)
                    })
                })
                    .then(parseJsonFetchResponse)
                    .then(renderResult)
                    .catch(function (err) {
                        alert(err.message || 'Erro ao calcular.');
                    })
                    .finally(function () {
                        updateButtons();
                    });
            });

            loadLists().catch(function (e) {
                console.error(e);
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <main class="app-main" style="margin-left: 0; margin-top: 0; max-width: 480px; margin: 48px auto; padding: 24px;">
        <h1 class="page-title">Login da Farmácia</h1>
        <div class="card">
            <form id="login-form" class="form-grid">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="Senha">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
            <p style="margin-top: 12px; color: var(--text-muted);">
                <a href="esqueci_senha.html">Esqueceu sua senha?</a>
            </p>
            <p style="margin-top: 8px; color: var(--text-muted);">
                Não tem conta? <a href="cadastro.html">Crie sua farmácia</a>
            </p>
            <p style="margin-top: 12px; color: var(--text-muted); font-size: 12px; text-align: center;">
                Ao usar o AI Pharma Guard, você concorda com nossos
                <a href="termos.html">Termos de Uso</a>. Este sistema é uma
                ferramenta de apoio farmacêutico e não substitui o julgamento
                clínico profissional.
            </p>
            <p id="login-erro" style="color: var(--risk-severe); margin-top: 8px;"></p>
        </div>
    </main>
    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var email = document.getElementById('email').value;
            var senha = document.getElementById('senha').value;
            var msgEl = document.getElementById('login-erro');
            msgEl.textContent = '';

            fetch('../backend/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, senha: senha })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    msgEl.textContent = data.message || 'Login inválido';
                }
            })
            .catch(function(err) {
                console.error('Erro no login:', err);
                msgEl.textContent = 'Erro ao conectar. Verifique se o servidor está rodando.';
            });
        });
    </script>
</body>
</html>

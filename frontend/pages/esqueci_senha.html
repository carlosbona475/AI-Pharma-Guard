<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci minha senha - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <main class="app-main" style="margin-left: 0; margin-top: 0; max-width: 480px; margin: 48px auto; padding: 24px;">
        <h1 class="page-title">Recuperar senha</h1>
        <div class="card">
            <p style="color: var(--text-muted); margin-bottom: 16px;">
                Informe o e-mail da sua farmácia. Enviaremos um link para redefinir sua senha.
            </p>
            <form id="form-esqueci" class="form-grid">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="contato@farmacia.com">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Enviar instruções</button>
                </div>
            </form>
            <p style="margin-top: 16px; color: var(--text-muted);">
                <a href="login.html">Voltar ao login</a>
            </p>
            <p id="msg" style="margin-top: 12px;"></p>
        </div>
    </main>
    <script>
        document.getElementById('form-esqueci').addEventListener('submit', function (e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var msgEl = document.getElementById('msg');
            msgEl.textContent = '';

            fetch('../backend/esqueci_senha.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                msgEl.style.color = data.success ? 'var(--risk-none)' : 'var(--risk-severe)';
                msgEl.textContent = data.message || (data.success ? 'Verifique seu e-mail.' : 'Erro ao enviar.');
            })
            .catch(function(err) {
                console.error('Erro:', err);
                msgEl.style.color = 'var(--risk-severe)';
                msgEl.textContent = 'Erro ao conectar. Verifique se o servidor está rodando.';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Farmácia - AI Pharma Guard</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="cadastro-page-body">
    <div class="cadastro-page">
        <header class="cadastro-page__header">
            <div class="cadastro-page__brand">
                <span class="cadastro-page__logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <defs>
                            <linearGradient id="cadastro-sh-grad" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4a7eb0"/>
                                <stop offset="1" stop-color="#2c5d8c"/>
                            </linearGradient>
                        </defs>
                        <path fill="url(#cadastro-sh-grad)" d="M12 2 4 5.5V12c0 5 3.5 9.7 8 11 4.5-1.3 8-6 8-11V5.5L12 2Z"/>
                        <path fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1" d="M12 2 4 5.5V12c0 5 3.5 9.7 8 11 4.5-1.3 8-6 8-11V5.5L12 2Z"/>
                        <path stroke="#fff" stroke-width="1.8" stroke-linecap="round" d="M12 9v6M9 12h6"/>
                    </svg>
                </span>
                <span class="cadastro-page__brand-name">AI Pharma Guard</span>
            </div>
            <a href="login.html" class="cadastro-page__back">← Voltar ao login</a>
        </header>

        <div class="cadastro-card">
            <h1 class="cadastro-card__title">Criar conta gratuita</h1>
            <p class="cadastro-card__subtitle">Preencha os dados da sua farmácia</p>

            <form id="cadastro-form" class="cadastro-form" novalidate>
                <div class="cadastro-field">
                    <label class="cadastro-label" for="nome">Nome da farmácia</label>
                    <div class="cadastro-input-wrap">
                        <span class="cadastro-input-wrap__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 7v14h16V7l-8-4Z"/><path d="M9 21v-6h6v6"/><path d="M12 10v4M10 12h4"/></svg>
                        </span>
                        <input type="text" id="nome" name="nome" required placeholder="Nome fantasia ou razão social" autocomplete="organization" class="cadastro-input cadastro-input--inset">
                    </div>
                </div>

                <div class="cadastro-field">
                    <label class="cadastro-label" for="email">E-mail</label>
                    <div class="cadastro-input-wrap">
                        <span class="cadastro-input-wrap__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        </span>
                        <input type="email" id="email" name="email" required placeholder="contato@suafarmacia.com.br" autocomplete="email" class="cadastro-input cadastro-input--inset">
                    </div>
                </div>

                <div class="cadastro-field">
                    <label class="cadastro-label" for="telefone">Telefone <span class="cadastro-label--optional">(opcional)</span></label>
                    <div class="cadastro-input-wrap">
                        <span class="cadastro-input-wrap__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        </span>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" autocomplete="tel" class="cadastro-input cadastro-input--inset">
                    </div>
                </div>

                <div class="cadastro-field">
                    <label class="cadastro-label" for="senha">Senha</label>
                    <div class="cadastro-input-wrap">
                        <span class="cadastro-input-wrap__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <input type="password" id="senha" name="senha" required placeholder="Mínimo 8 caracteres" autocomplete="new-password" class="cadastro-input cadastro-input--inset" minlength="8">
                        <button type="button" class="cadastro-pass-toggle" id="cadastro-pass-toggle" aria-label="Mostrar senha" aria-pressed="false">
                            <svg class="cadastro-pass-toggle__show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="cadastro-pass-toggle__hide hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div class="cadastro-pw-meter" id="cadastro-pw-meter" data-strength="0" aria-live="polite">
                        <div class="cadastro-pw-meter__bars">
                            <span class="cadastro-pw-meter__bar"></span>
                            <span class="cadastro-pw-meter__bar"></span>
                            <span class="cadastro-pw-meter__bar"></span>
                            <span class="cadastro-pw-meter__bar"></span>
                        </div>
                        <span class="cadastro-pw-meter__hint" id="cadastro-pw-hint">Força da senha</span>
                    </div>
                </div>

                <div class="cadastro-field">
                    <label class="cadastro-label" for="senha-confirmar">Confirmar senha</label>
                    <div class="cadastro-input-wrap">
                        <span class="cadastro-input-wrap__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <input type="password" id="senha-confirmar" name="senha-confirmar" required placeholder="Repita a senha" autocomplete="new-password" class="cadastro-input cadastro-input--inset">
                        <button type="button" class="cadastro-pass-toggle" id="cadastro-confirm-toggle" aria-label="Mostrar confirmação de senha" aria-pressed="false">
                            <svg class="cadastro-pass-toggle__show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="cadastro-pass-toggle__hide hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <p class="cadastro-match-hint hidden" id="cadastro-match-hint" role="alert">As senhas não coincidem.</p>
                </div>

                <div class="cadastro-terms">
                    <label class="cadastro-terms__label">
                        <input type="checkbox" id="aceite-termos" required>
                        <span>Li e aceito os <a href="termos.html" target="_blank" rel="noopener noreferrer">Termos de Uso</a> do AI Pharma Guard.</span>
                    </label>
                </div>

                <div class="cadastro-actions">
                    <button type="submit" class="btn btn-primary cadastro-submit" id="cadastro-submit">
                        <span class="cadastro-submit-idle">Criar conta</span>
                        <span class="cadastro-submit-loading hidden" aria-hidden="true">Cadastrando...</span>
                    </button>
                </div>
            </form>

            <p class="cadastro-footer-line">
                Já tem conta? <a href="login.html" class="cadastro-footer-line__link">Faça login</a>
            </p>
            <p id="cadastro-msg" class="cadastro-msg" role="status"></p>
        </div>
    </div>

    <script src="../js/fetch-helpers.js"></script>
    <script>
        (function () {
            var form = document.getElementById('cadastro-form');
            var senha = document.getElementById('senha');
            var senhaConfirm = document.getElementById('senha-confirmar');
            var msgEl = document.getElementById('cadastro-msg');
            var matchHint = document.getElementById('cadastro-match-hint');
            var pwMeter = document.getElementById('cadastro-pw-meter');
            var pwBars = pwMeter.querySelectorAll('.cadastro-pw-meter__bar');
            var pwHint = document.getElementById('cadastro-pw-hint');
            var submitBtn = document.getElementById('cadastro-submit');
            var idleLabel = submitBtn.querySelector('.cadastro-submit-idle');
            var loadLabel = submitBtn.querySelector('.cadastro-submit-loading');

            function bindToggle(btnId, inputId) {
                var btn = document.getElementById(btnId);
                var input = document.getElementById(inputId);
                var iconShow = btn.querySelector('.cadastro-pass-toggle__show');
                var iconHide = btn.querySelector('.cadastro-pass-toggle__hide');
                btn.addEventListener('click', function () {
                    var showing = input.getAttribute('type') === 'text';
                    if (showing) {
                        input.setAttribute('type', 'password');
                        btn.setAttribute('aria-label', 'Mostrar senha');
                        btn.setAttribute('aria-pressed', 'false');
                        iconShow.classList.remove('hidden');
                        iconHide.classList.add('hidden');
                    } else {
                        input.setAttribute('type', 'text');
                        btn.setAttribute('aria-label', 'Ocultar senha');
                        btn.setAttribute('aria-pressed', 'true');
                        iconShow.classList.add('hidden');
                        iconHide.classList.remove('hidden');
                    }
                });
            }
            bindToggle('cadastro-pass-toggle', 'senha');
            bindToggle('cadastro-confirm-toggle', 'senha-confirmar');

            function passwordStrength(pw) {
                if (!pw) return { level: 0, label: 'Digite uma senha' };
                var lo = /[a-z]/.test(pw);
                var up = /[A-Z]/.test(pw);
                var num = /[0-9]/.test(pw);
                var spe = /[^a-zA-Z0-9]/.test(pw);
                var len = pw.length;
                var level = 1;
                if (len >= 8) level = 2;
                if (len >= 8 && lo && up && num) level = 3;
                if (len >= 10 && lo && up && num && spe) level = 4;
                var labels = ['', 'Fraca', 'Média', 'Boa', 'Forte'];
                return { level: level, label: labels[level] };
            }

            function updatePwMeter() {
                var r = passwordStrength(senha.value);
                pwMeter.setAttribute('data-strength', String(r.level));
                pwBars.forEach(function (bar, i) {
                    bar.classList.toggle('cadastro-pw-meter__bar--on', i < r.level);
                });
                pwHint.textContent = senha.value ? 'Força: ' + r.label : 'Força da senha';
            }

            senha.addEventListener('input', updatePwMeter);
            senha.addEventListener('focus', updatePwMeter);

            function checkMatch() {
                var a = senha.value;
                var b = senhaConfirm.value;
                if (!b) {
                    matchHint.classList.add('hidden');
                    return true;
                }
                var ok = a === b;
                matchHint.classList.toggle('hidden', ok);
                return ok;
            }
            senhaConfirm.addEventListener('input', checkMatch);
            senha.addEventListener('input', checkMatch);

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                msgEl.textContent = '';
                msgEl.className = 'cadastro-msg';

                var nome = document.getElementById('nome').value.trim();
                var email = document.getElementById('email').value.trim();
                var telefone = document.getElementById('telefone').value.trim();
                var aceite = document.getElementById('aceite-termos');

                if (!aceite || !aceite.checked) {
                    msgEl.classList.add('cadastro-msg--err');
                    msgEl.textContent = 'Você precisa aceitar os Termos de Uso para criar uma conta.';
                    return;
                }
                if (senha.value.length < 8) {
                    msgEl.classList.add('cadastro-msg--err');
                    msgEl.textContent = 'A senha deve ter pelo menos 8 caracteres.';
                    return;
                }
                if (!checkMatch() || senha.value !== senhaConfirm.value) {
                    matchHint.classList.remove('hidden');
                    msgEl.classList.add('cadastro-msg--err');
                    msgEl.textContent = 'As senhas precisam ser iguais.';
                    return;
                }

                submitBtn.disabled = true;
                idleLabel.classList.add('hidden');
                loadLabel.classList.remove('hidden');

                fetch('/backend/cadastro_farmacia.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome, email: email, senha: senha.value, telefone: telefone })
                })
                    .then(parseJsonFetchResponse)
                    .then(function (data) {
                        if (data.success) {
                            msgEl.classList.add('cadastro-msg--ok');
                            msgEl.textContent = 'Cadastro realizado com sucesso! Você receberá um contato para ativação da sua conta.';
                        } else {
                            msgEl.classList.add('cadastro-msg--err');
                            msgEl.textContent = data.message || 'Erro ao cadastrar.';
                        }
                    })
                    .catch(function (err) {
                        console.error('Erro no cadastro:', err);
                        msgEl.classList.add('cadastro-msg--err');
                        msgEl.textContent = err.message || 'Erro ao conectar. Verifique se o servidor está rodando.';
                    })
                    .finally(function () {
                        submitBtn.disabled = false;
                        idleLabel.classList.remove('hidden');
                        loadLabel.classList.add('hidden');
                    });
            });
        })();
    </script>
</body>
</html>

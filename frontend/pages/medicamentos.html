    <main class="app-main">
        <h1 class="page-title">Medicamentos</h1>

        <div class="card">
            <h3>Cadastro de Medicamento</h3>
            <form id="form-medicamento" class="form-grid" style="max-width: 640px;">
                <div class="form-group">
                    <label for="nome-medicamento">Nome do medicamento *</label>
                    <input type="text" id="nome-medicamento" name="nome-medicamento" required placeholder="Nome do medicamento">
                </div>
                <div class="form-group">
                    <label for="classe">Classe farmacológica</label>
                    <input type="text" id="classe" name="classe" placeholder="Ex: Anti-hipertensivo">
                </div>
                <div class="form-group">
                    <label for="dose">Dose</label>
                    <input type="text" id="dose" name="dose" placeholder="Ex: 50mg">
                </div>
                <div class="form-group">
                    <label for="indicacao">Indicação</label>
                    <input type="text" id="indicacao" name="indicacao" placeholder="Indicação de uso">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="contraindicacoes">Contraindicações</label>
                    <input type="text" id="contraindicacoes" name="contraindicacoes" placeholder="Contraindicacoes">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Cadastrar Medicamento</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>Medicamentos cadastrados</h3>
            <div class="table-wrap">
                <table class="data-table" id="tabela-medicamentos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Classe</th>
                            <th>Dose</th>
                            <th>Indicação</th>
                            <th>Contraindicações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="medicamentos-error" class="medicamentos-error" style="display: none; margin-top: 12px; padding: 12px; background: var(--risk-severe); color: #fff; border-radius: 6px;">
                <span id="medicamentos-error-msg"></span>
                <button type="button" id="btn-retry-medicamentos" class="btn btn-secondary" style="margin-left: 12px;">Tentar novamente</button>
            </div>
        </div>
    </main>
    <script src="../js/shell.js"></script>
    <script src="../js/app.js?v=4"></script>
    <script>
        (function() {
            var form = document.getElementById('form-medicamento');
            var tbody = document.querySelector('#tabela-medicamentos tbody');
            var errorBlock = document.getElementById('medicamentos-error');
            var errorMsg = document.getElementById('medicamentos-error-msg');
            var btnRetry = document.getElementById('btn-retry-medicamentos');

            function setLoading(loading) {
                errorBlock.style.display = 'none';
                if (loading) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Carregando...</td></tr>';
                }
            }

            function setError(msg) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">—</td></tr>';
                errorMsg.textContent = msg || 'Erro ao carregar medicamentos.';
                errorBlock.style.display = 'block';
                console.error('[Medicamentos]', msg);
            }

            function renderRows(medicamentos) {
                setLoading(false);
                errorBlock.style.display = 'none';
                if (!Array.isArray(medicamentos)) {
                    setError('Resposta inválida da API (não é lista).');
                    return;
                }
                if (medicamentos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Nenhum medicamento cadastrado.</td></tr>';
                    return;
                }
                tbody.innerHTML = medicamentos.map(function(m) {
                    var ind = (m.indicacao || '').slice(0, 40);
                    var cont = (m.contraindicacoes || '').slice(0, 40);
                    return '<tr><td>' + m.id + '</td><td>' + escapeHtml(m.nome) + '</td><td>' + escapeHtml(m.classe_farmacologica || '-') + '</td><td>' + escapeHtml(m.dose || '-') + '</td><td>' + escapeHtml(ind) + '</td><td>' + escapeHtml(cont) + '</td></tr>';
                }).join('');
            }

            function loadMedicamentos() {
                setLoading(true);
                api.listarMedicamentos()
                    .then(function(data) {
                        renderRows(Array.isArray(data) ? data : (data && data.data ? data.data : null));
                    })
                    .catch(function(err) {
                        setError(err && err.message ? err.message : 'Falha na rede ou no servidor. Verifique o console.');
                    });
            }

            if (btnRetry) btnRetry.addEventListener('click', loadMedicamentos);

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                api.cadastrarMedicamento({
                    nome: document.getElementById('nome-medicamento').value,
                    classe: document.getElementById('classe').value || '',
                    dose: document.getElementById('dose').value || '',
                    indicacao: document.getElementById('indicacao').value || '',
                    contraindicacoes: document.getElementById('contraindicacoes').value || ''
                }).then(function() {
                    form.reset();
                    loadMedicamentos();
                    btn.disabled = false;
                    alert('Medicamento cadastrado com sucesso!');
                }).catch(function(err) {
                    console.error('[Medicamentos] Erro ao cadastrar:', err);
                    btn.disabled = false;
                    alert('Erro: ' + (err.message || 'Não foi possível cadastrar.'));
                });
            });

            loadMedicamentos();
        })();
    </script>
</body>
</html>
